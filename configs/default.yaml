model:
  llm_name: "Qwen/Qwen3.5-0.8B"  # ModelScope path
  encoder_dim: 256
  llm_dim: 1024  # Qwen2-0.5B hidden size
  max_seq_len: 2048
  mode: "lossless"  # "direct", "encoder_decoder", or "lossless"

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  warmup_steps: 10
  max_steps: 100
  fp16: false
  reconstruction_weight: 0.1  # Weight for reconstruction loss in encoder_decoder mode

data:
  num_samples: 10000
  min_len: 128
  max_len: 128
  min_dims: 1
  max_dims: 1
