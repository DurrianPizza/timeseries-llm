model:
  llm_name: "Qwen/Qwen3.5-0.8B"  # ModelScope path
  encoder_dim: 256
  llm_dim: 1024  # Qwen2-0.5B hidden size
  max_seq_len: 2048

training:
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  warmup_steps: 10
  max_steps: 100
  fp16: false

data:
  num_samples: 10000
  min_len: 128
  max_len: 128
  min_dims: 8
  max_dims: 8
